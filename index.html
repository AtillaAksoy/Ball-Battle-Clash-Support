<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ball Battle Clash Support</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070914;
        --panel: #111522;
        --text: #f6f7fb;
        --muted: #b8c0d4;
        --line: rgba(255, 255, 255, 0.12);
        --accent: #27c7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 0%, rgba(39, 199, 255, 0.18), transparent 28rem),
          radial-gradient(circle at 90% 10%, rgba(255, 63, 81, 0.14), transparent 24rem),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 100%);
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(17, 21, 34, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 8vw, 58px);
        line-height: 1;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
      }

      a:first-child {
        border-color: rgba(39, 199, 255, 0.5);
        color: #d9f6ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ball Battle Clash</h1>
      <p>Support, privacy information, and feedback links for Ball Battle Clash.</p>
      <nav>
        <a href="./privacy.html">Privacy Policy</a>
        <a href="https://github.com/AtillaAksoy/Ball-Battle-Clash-Support/issues">Support Issues</a>
      </nav>
    </main>
  </body>
</html>
